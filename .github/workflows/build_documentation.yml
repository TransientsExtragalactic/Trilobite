# .github/workflows/docs.yml
# ------------------------------------------------------------- #
# GitHub Actions Workflow to Build and Deploy Pisces Docs      #
# ------------------------------------------------------------- #
# This workflow builds and deploys the documentation for the
# Pisces project using Sphinx. It supports two deployment modes:
#
# 1. Dev docs:   pushed to `/dev` when a `dev_*` branch is updated
# 2. Stable docs: pushed to `/stable` when a `vX.Y.Z` tag is pushed
#
# A redirect index is also deployed to root `/` on main or version tag.
name: Build and Deploy Documentation

# This workflow builds and deploys the documentation for the Pisces project.
# It supports two deployment modes:
# 1. Dev docs:   pushed to `/dev` when a `dev_*` branch is updated
# 2. Stable docs: pushed to `/stable` when a `vX.Y.Z` tag is pushed
# A redirect index is also deployed to root `/` on main or version tag.
on:
  push:
    branches:
      - main
      - dev-*              # Match dev branches like dev_v1.4.0
    tags:
      - "v*"               # Match version tags like v1.2.0
  workflow_dispatch:

permissions:
  contents: write

# Perform the workflow.
jobs:
  docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup the python environment for the operation.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Cache pip dependencies to speed up builds. This
      # depends on the os and the hash of the pyproject.toml file.
      # It will therefore be invalidated when the dependencies change.
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-docs-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-docs-

      # Install the dependencies required to build the documentation.
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[docs]

      # Actually build the documentation. We use the `-j auto` flag to
      # allow Sphinx to use all available CPU cores for faster builds.
      - name: Build documentation with Sphinx
        run: |
          mkdir -p docs/_build/html
          sphinx-build -b html -j auto docs/source docs/_build/html

      # ---------------------------------------------------------
      # 1️⃣ Deploy versioned docs (vX.Y.Z or dev)
      # ---------------------------------------------------------
      - name: Deploy versioned documentation
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/_build/html
          destination_dir: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}
          keep_files: true
      # ---------------------------------------------------------
      # 2️⃣ Update versions.json + root redirect
      # ---------------------------------------------------------
      - name: Update versions.json and root redirect
        run: |
          set -e

          BASE_URL="https://eliza-diggins.github.io/Triceratops"

          echo "Cloning gh-pages branch..."
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
          cd gh-pages
          git pull origin gh-pages

          echo "Generating versions.json..."

          python - << PY
          import json
          import re
          from pathlib import Path

          BASE_URL = "${BASE_URL}"
          root = Path(".")

          versions = []

          # Include dev if exists
          if (root / "dev").is_dir():
              versions.append({
                  "name": "dev",
                  "version": "dev",
                  "url": f"{BASE_URL}/dev/"
              })

          tag_dirs = []
          for p in root.iterdir():
              if p.is_dir() and re.match(r"^v\d+\.\d+\.\d+$", p.name):
                  tag_dirs.append(p.name)

          tag_dirs.sort(reverse=True)

          for tag in tag_dirs:
              versions.append({
                  "name": tag,
                  "version": tag,
                  "url": f"{BASE_URL}/{tag}/"
              })

          (root / "versions.json").write_text(json.dumps(versions, indent=2) + "\n")
          print("Updated versions.json")
          PY

          # Root redirect (only on main or tag)
          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == refs/tags/* ]]; then

            LATEST=$(ls -d v* 2>/dev/null | sort -Vr | head -n 1)

            if [ -n "$LATEST" ]; then
              TARGET="$BASE_URL/$LATEST/"
            else
              TARGET="$BASE_URL/dev/"
            fi

            echo "Creating root redirect to $TARGET"

            cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=$TARGET" />
            </head>
            <body>
              Redirecting to <a href="$TARGET">$TARGET</a>
            </body>
          </html>
          EOF
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add versions.json index.html || true
          git diff --quiet && echo "No changes" || git commit -m "Update versions.json and redirect"
          git push
