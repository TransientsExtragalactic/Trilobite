# .github/workflows/build_and_release.yml
# ------------------------------------------ #
# GitHub Actions Workflow for PyPI Release
# ------------------------------------------ #
# Builds manylinux/macOS/Windows wheels with cibuildwheel and publishes to PyPI
# when a version tag (v*) is pushed.
name: Build and Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  # ------------------------------------------ #
  # Build binary wheels for each platform       #
  # ------------------------------------------ #
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for setuptools-scm tag-based versioning

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-* cp313-*
          CIBW_SKIP: "*-musllinux_*"  # skip Alpine/musl Linux

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ------------------------------------------ #
  # Build source distribution                   #
  # ------------------------------------------ #
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  # ------------------------------------------ #
  # Publish everything to PyPI                  #
  # ------------------------------------------ #
  upload_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Check distributions
        run: pipx run twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true
